<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>what keeps the pixel hot?</title>
<style>
  html,body{margin:0;height:100%;width:100%;background:#000;overflow:hidden;}
  body{cursor:none;touch-action:none;-webkit-user-select:none;user-select:none;
       font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;}
  #c{display:block;position:fixed;inset:0;}
  .ov{position:fixed;pointer-events:none;}
  #scan{inset:0;opacity:.5;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.020) 0 1px,transparent 1px 3px);}
  #vig{inset:0;background:radial-gradient(ellipse at center,rgba(0,0,0,0) 52%,rgba(0,0,0,.6) 100%);}
  .hud{top:15px;font-size:11px;letter-spacing:2px;color:rgba(255,200,150,.30);}
  #hudL{left:17px;}
  #hudR{right:17px;text-align:right;}
  #vsync{left:0;right:0;bottom:26%;text-align:center;padding:0 24px;
    font-size:13px;line-height:1.7;letter-spacing:2px;color:rgba(255,226,202,1);
    opacity:0;transition:opacity .28s;}
  #bar{left:0;bottom:0;height:2px;width:0;background:#000;opacity:.65;}
  #pause{left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;
    font-size:12px;letter-spacing:3px;color:rgba(255,200,150,.5);opacity:0;transition:opacity .4s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan" class="ov"></div>
<div id="vig" class="ov"></div>
<div id="hudL" class="ov hud"></div>
<div id="hudR" class="ov hud"></div>
<div id="vsync" class="ov"></div>
<div id="bar" class="ov"></div>
<div id="pause" class="ov">&mdash; attention elsewhere &mdash;</div>
<script>
"use strict";
const TAU = Math.PI*2;
const R_OPT=78, SIGMA=46, WARM_PEAK=.62, COOL_K=.26, COOL_C=.055, FIX_R=26, REVEAL_AT=75, DEATH_EPS=.0009;
const KEY="dpm:hotpixel";

const KOAN="what keeps the pixel hot?";
const REVEALSEQ=["what keeps the pixel hot?","you do.","your attention. nothing else.","and it was only ever borrowed.","stop, and it goes dark.","that isn't a punishment. that's the terms."];
const ECHO=["you do.","still borrowed.","stay with it.","it was never lit on its own."];
const GONE=["where did it go","you left. it's cooling.","come back to it"];
const FIX =["not on it.","it doesn't like to be held","look beside it, not at it","let it sit at the edge of your sight"];
const HOT =["there. that's the distance.","stay close. don't crowd it.","hold it here","follow, don't chase"];
const COLD=["it's going cold","find it without hunting it","almost out","keep it lit"];
const WARM=["warmer","yes. beside it.","this is the distance"];
const NEAR=["a dead pixel. somewhere on this screen.","keep it warm","circle it"];
const DEATH=["it went out.","it comes back. somewhere else.","begin again.","relight it."];
const NUDGE=["keep it warm.","find the dead pixel.","move closer."];

let cv,ctx,W=0,H=0,dpr=1;
let px=0,py=0,heading=Math.random()*TAU,speed=16,heat=.22;
let mx=-9999,my=-9999,attending=false,touching=false,lastType="mouse";
let started=false,paused=false;
let gameTime=0,runStartGT=0,lastMs=0;
let longest=0,revealed=false,relits=0;
let deaths=[];
let line={text:"",start:-99,dur:0,hard:false};
let queue=[];
let lastAmbientGT=14,lastKoanGT=21;

const pick=a=>a[(Math.random()*a.length)|0];
function ss01(a,b,x){let t=(x-a)/(b-a);return t<0?0:t>1?1:t*t*(3-2*t);}
function fmt(s){s=Math.max(0,Math.floor(s));const m=(s/60)|0;return m+":"+String(s%60).padStart(2,"0");}
function heatColor(t){
  t=t<0?0:t>1?1:t;
  const S=[[0,[70,14,16]],[.35,[180,55,30]],[.65,[240,120,45]],[.85,[255,180,95]],[1,[255,238,205]]];
  for(let i=0;i<S.length-1;i++){const[a,ca]=S[i],[b,cb]=S[i+1];
    if(t<=b){const u=(t-a)/((b-a)||1);return{r:Math.round(ca[0]+(cb[0]-ca[0])*u),g:Math.round(ca[1]+(cb[1]-ca[1])*u),b:Math.round(ca[2]+(cb[2]-ca[2])*u)};}}
  return{r:255,g:238,b:205};
}

function enqueue(text,atGT,dur,hard){queue.push({text,atGT,dur:dur||3600,hard:hard!==false});queue.sort((a,b)=>a.atGT-b.atGT);}
function say(t,dur,hard){line={text:t,start:gameTime,dur:dur||3600,hard:!!hard};}
function reveal(){let t=gameTime+.5;for(const ln of REVEALSEQ){enqueue(ln,t,3700,true);t+=4.3;}}

function ambientPool(){
  if(!attending) return GONE;
  const d=Math.hypot(px-mx,py-my);
  if(d<FIX_R) return FIX;
  if(heat>.6) return HOT;
  if(heat<.28) return COLD;
  const g=Math.exp(-((d-R_OPT)*(d-R_OPT))/(2*SIGMA*SIGMA));
  return g>.45?WARM:NEAR;
}
function schedule(){
  const active = gameTime < line.start+line.dur+1.0;
  if(active || queue.length) return;
  if(!revealed){ if(gameTime-lastKoanGT>33){say(KOAN,3800,false);lastKoanGT=gameTime;return;} }
  else { if(gameTime-lastKoanGT>52){say(pick(ECHO),3400,false);lastKoanGT=gameTime;return;} }
  if(gameTime-lastAmbientGT>7.5){say(pick(ambientPool()),3600,false);lastAmbientGT=gameTime;}
}

function updatePixel(dt){
  const runSec=gameTime-runStartGT;
  heading += (Math.random()*2-1)*1.6*dt;
  const tgt=16+Math.min(runSec*.42,46);
  speed += (tgt-speed)*Math.min(1,dt*.8);
  let nx=px+Math.cos(heading)*speed*dt, ny=py+Math.sin(heading)*speed*dt;
  if(attending){
    const dx=px-mx,dy=py-my,d=Math.hypot(dx,dy)||.001;
    if(d<FIX_R){const f=(1-d/FIX_R)*90;nx+=(dx/d)*f*dt;ny+=(dy/d)*f*dt;heading=Math.atan2(dy,dx);}
  }
  const m=14;
  if(nx<m){nx=m;heading=Math.PI-heading;} else if(nx>W-m){nx=W-m;heading=Math.PI-heading;}
  if(ny<m){ny=m;heading=-heading;} else if(ny>H-m){ny=H-m;heading=-heading;}
  px=nx;py=ny;
}
function updateHeat(dt){
  let warm=0;
  if(attending && mx>-9000){
    const d=Math.hypot(px-mx,py-my);
    const g=Math.exp(-((d-R_OPT)*(d-R_OPT))/(2*SIGMA*SIGMA));
    warm=WARM_PEAK*g*ss01(0,FIX_R,d);
  }
  heat += (warm-(COOL_K*heat+COOL_C))*dt;
  if(heat>1)heat=1;
  if(heat<=DEATH_EPS){heat=0;die();}
}
function die(){
  deaths.push({x:px,y:py,t0:gameTime});
  const runSec=gameTime-runStartGT;
  if(runSec>longest)longest=runSec;
  relits++; save();
  let nx,ny,tries=0;
  do{nx=W*(.15+Math.random()*.7);ny=H*(.15+Math.random()*.7);tries++;}
  while(tries<12 && attending && Math.hypot(nx-mx,ny-my)<Math.min(W,H)*.33);
  px=nx;py=ny;heading=Math.random()*TAU;speed=14;heat=.17;
  runStartGT=gameTime;
  say(pick(DEATH),3200,true);
}

function update(dt){
  while(queue.length && queue[0].atGT<=gameTime){const q=queue.shift();say(q.text,q.dur,q.hard);}
  if(!started){
    if(queue.length===0 && gameTime-lastAmbientGT>9){
      const active=gameTime<line.start+line.dur+1.0;
      if(!active){say(pick(NUDGE),3400,false);lastAmbientGT=gameTime;}
    }
    return;
  }
  updatePixel(dt);
  updateHeat(dt);
  const runSec=gameTime-runStartGT;
  if(!revealed && runSec>=REVEAL_AT){revealed=true;save();reveal();}
  schedule();
  deaths=deaths.filter(d=>gameTime-d.t0<1.1);
}

function draw(){
  ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
  const dh = started?heat:(.20+.055*Math.sin(gameTime*1.7));
  const c=heatColor(dh);
  const gr=5+dh*52;
  const grad=ctx.createRadialGradient(px,py,0,px,py,gr);
  grad.addColorStop(0,"rgba("+c.r+","+c.g+","+c.b+","+(.5*dh+.06).toFixed(3)+")");
  grad.addColorStop(.45,"rgba("+c.r+","+c.g+","+c.b+","+(.16*dh).toFixed(3)+")");
  grad.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(px,py,gr,0,TAU);ctx.fill();
  ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(.14+.86*dh).toFixed(3)+")";
  ctx.fillRect(px-.9,py-.9,1.8,1.8);
  for(const dn of deaths){
    const u=(gameTime-dn.t0)/1.1; if(u>=1)continue;
    ctx.strokeStyle="rgba(150,60,40,"+((1-u)*.25).toFixed(3)+")";ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(dn.x,dn.y,6+u*60,0,TAU);ctx.stroke();
  }
  if(attending && mx>-9000){
    ctx.strokeStyle="rgba(255,185,120,.07)";ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(mx,my,R_OPT,0,TAU);ctx.stroke();
    ctx.strokeStyle="rgba(140,45,40,.06)";
    ctx.beginPath();ctx.arc(mx,my,FIX_R,0,TAU);ctx.stroke();
    ctx.fillStyle="rgba(255,205,160,.14)";ctx.fillRect(mx-.6,my-.6,1.6,1.6);
  }
}

let vEl,lEl,rEl,bEl,pEl;
function ui(){
  let a=0;const te=gameTime-line.start;
  if(line.text){a=te<.5?te/.5:te<line.dur?1:Math.max(0,1-(te-line.dur)/1.0);}
  vEl.textContent=line.text||"";
  vEl.style.opacity=(a*.85).toFixed(3);
  lEl.textContent="hot "+fmt(started?gameTime-runStartGT:0);
  rEl.textContent="best "+fmt(longest);
  const dh=started?heat:.2,c=heatColor(dh);
  bEl.style.width=(dh*100).toFixed(1)+"%";
  bEl.style.background="rgb("+c.r+","+c.g+","+c.b+")";
  pEl.style.opacity=paused?"0.5":"0";
}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.floor(W*dpr);cv.height=Math.floor(H*dpr);
  cv.style.width=W+"px";cv.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  px=Math.min(Math.max(px,14),W-14);py=Math.min(Math.max(py,14),H-14);
}

function begin(){ if(started)return; started=true; runStartGT=gameTime; }

async function load(){
  try{ const v=localStorage.getItem(KEY); if(v){const s=JSON.parse(v);longest=s.longest||0;revealed=!!s.revealed;relits=s.relits||0;} }catch(e){}
}
async function save(){
  try{ localStorage.setItem(KEY,JSON.stringify({longest,revealed,relits})); }catch(e){}
}

function bindPointer(){
  const on=(t,fn,o)=>window.addEventListener(t,fn,o);
  on("pointermove",e=>{mx=e.clientX;my=e.clientY;attending=true;lastType=e.pointerType;begin();});
  on("pointerdown",e=>{mx=e.clientX;my=e.clientY;attending=true;lastType=e.pointerType;if(e.pointerType==="touch")touching=true;begin();});
  on("pointerup",e=>{if(e.pointerType==="touch"){touching=false;attending=false;}});
  on("pointercancel",()=>{touching=false;attending=false;});
  on("pointerleave",()=>{if(lastType!=="touch")attending=false;});
  document.addEventListener("mouseleave",()=>{if(lastType!=="touch")attending=false;});
  on("blur",()=>{paused=true;});
  on("focus",()=>{paused=false;lastMs=performance.now();});
  document.addEventListener("visibilitychange",()=>{if(document.hidden){paused=true;}else{paused=false;lastMs=performance.now();}});
}

function loop(ms){
  let dt=(ms-lastMs)/1000;lastMs=ms;
  if(dt>.05)dt=.05; if(dt<0)dt=0;
  if(!paused){gameTime+=dt;update(dt);}
  draw();ui();
  requestAnimationFrame(loop);
}

function init(){
  cv=document.getElementById("c");ctx=cv.getContext("2d");
  vEl=document.getElementById("vsync");lEl=document.getElementById("hudL");
  rEl=document.getElementById("hudR");bEl=document.getElementById("bar");pEl=document.getElementById("pause");
  resize();
  px=W*.5;py=H*.45;heat=.22;heading=Math.random()*TAU;
  window.addEventListener("resize",resize);
  bindPointer();
  load();
  enqueue("there is a dead pixel on this screen.",1.0,4200,true);
  enqueue("keep it warm.",6.2,3600,true);
  enqueue("not on it. beside it.",11.2,3600,true);
  lastAmbientGT=14;lastKoanGT=21;
  lastMs=performance.now();
  requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
